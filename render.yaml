services:
  - type: web
    name: resume-screening
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn resume_project.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: DEBUG
        value: "False"
      - key: DB_ENGINE
        value: "sqlite"
